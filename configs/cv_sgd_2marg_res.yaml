# Configuration for train_prototype_plus.py
# ResNet50 Classification Training Configuration

# Data Configuration
data:
  data_dir: '/kaggle/input/datasets/judopy/farfum-91/FaRFUM-RoP_crop_9_1_split/train'
  csv_path: '/kaggle/input/datasets/judopy/farfum-91/FaRFUM-RoP_crop_9_1_split/train/training_5_folds_stratified.csv'
  input_size: [512, 512]
  n_folds: 5

# Training Configuration
training:
  batch_size: 16 
  epochs: 5
  lr: 0.0003
  momentum: 0.9
  weight_decay: 0.0001
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  use_amp: true
  # use_cache: false
  # LR Scheduler Configuration
  use_scheduler: true  # Enable learning rate scheduling
  scheduler_type: 'cosine'  # Options: 'cosine' (CosineAnnealingLR), 'step', 'none'
  scheduler_t_max: 5  # For cosine: number of epochs for one cycle (usually same as epochs)
  scheduler_eta_min: 0.00001  # For cosine: minimum learning rate

# Model Configuration
model:
  model_name: 'resnet50'  # Options: 'resnet50', 'efficientnet_b0'
  dropout_rate: 0.3
  freeze_backbone: false
  custom_head: [512]  # e.g., [512, 256] for custom head, null for simple head
  num_classes: 3

# Loss Configuration
loss:
  loss_type: 'ce'  # Options: 'ce' (CrossEntropy), 'weighted_ce', 'focal'

# Sampler Configuration
sampler:
  sampler_type: 'weighted_random'  # Options: 'none', 'weighted_random', 'balanced_batch'

# Knowledge Distillation Configuration
distillation:
  use_distillation: true
  teacher_checkpoint: '/kaggle/input/models/judopy/seg-checkpoint/pytorch/default/1/best.pt'
  teacher_model_name: 'AttentionUNet'
  teacher_input_size: [512, 512]
  teacher_num_classes: 4  # Teacher was trained on segmentation with 4 classes (bg, artery, vein, crossing)
  start_epoch: 0  # Start distillation from epoch N (0-indexed). Epochs 0-1 warmup, 2+ distillation
  use_fundus_mask: true  # Apply fundus region mask to filter corner/background attention
  qualitative_check: true  
  qualitative_every_n_batches: 50

# Ordinal Learning Configuration
ordinal:
  use_ordinal_loss: true
  ordinal_margin_diff1: 0.5  # Required: margin when |anchor_label - negative_label| = 1
  ordinal_margin_diff2: 0.8  # Required: margin when |anchor_label - negative_label| = 2
  ordinal_mining_strategy: 'semihard'  # Options: 'hard', 'semihard' (recommended), 'all'
  verbose: false  # Print distance statistics for margin tuning (set false after tuning)
  print_freq: 100  # Print stats every N batches (lower = more frequent)
  # Note: Requires batch_size >= 18 (3 classes × 6 samples/class minimum)
  # Increase batch_size if seeing invalid triplets (anchor==negative)

# Loss Weighting Configuration
loss_weights:
  lambda1: 1.0  # Weight for classification loss
  lambda2: 0.5  # Weight for ordinal triplet loss
  lambda3: 1.0  # Weight for distillation loss

# Cross Validation Configuration
cross_validation:
  use_cross_validation: true

# Logging Configuration
logging:
  run_name: 'resnet50_sgd'  # Will be appended with run_id
  log_dir: './runs'
