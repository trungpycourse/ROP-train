# Configuration for cv_adam.py
# ResNet50 Classification Training Configuration with Adam Optimizer

# Data Configuration
data:
  data_dir: './datasets/FaRFUM-RoP_crop'
  csv_path: './datasets/FaRFUM-RoP_crop/training_5_folds_stratified.csv'
  input_size: [512, 512]
  n_folds: 5

# Training Configuration
training:
  batch_size: 16
  epochs: 100
  lr: 0.0001  # Adam typically uses lower learning rate than SGD
  weight_decay: 0.0001
  num_workers: 0
  pin_memory: true
  prefetch_factor: 2
  use_amp: true
  use_cache: false
  # LR Scheduler Configuration
  use_scheduler: true  # Enable learning rate scheduling
  scheduler_type: 'cosine'  # Options: 'cosine' (CosineAnnealingLR), 'step', 'none'
  scheduler_t_max: 100  # For cosine: number of epochs for one cycle (usually same as epochs)
  scheduler_eta_min: 0.00001  # For cosine: minimum learning rate

# Model Configuration
model:
  model_name: 'resnet50'  # Options: 'resnet50', 'efficientnet_b0'
  dropout_rate: 0.3
  freeze_backbone: false
  custom_head: [512]  # e.g., [512, 256] for custom head, null for simple head

# Loss Configuration
loss:
  loss_type: 'ce'  # Options: 'ce' (CrossEntropy), 'weighted_ce', 'focal'

# Sampler Configuration
sampler:
  sampler_type: 'weighted_random'  # Options: 'none', 'weighted_random', 'balanced_batch'

# Knowledge Distillation Configuration
distillation:
  use_distillation: false
  teacher_checkpoint: '../AV-seg/model_ckpts/FAV-AttentionUNet/best.pt'
  teacher_model_name: 'AttentionUNet'
  teacher_input_size: [512, 512]
  use_fundus_mask: true  # Apply fundus region mask to filter corner/background attention


# Ordinal Learning Configuration (Ordinal Contrastive Loss)
ordinal:
  use_ordinal_loss: true
  ordinal_alpha: 0.5  # Scaling factor for target distances (0.5 for labels {0,1,2} maps to [0, 1.0])
  ordinal_normalize: true  # L2-normalize embeddings before computing cosine similarity
  ordinal_eps: 1e-8  # Small epsilon for numerical stability
  # OCL uses all pairs in batch (N*(N-1)/2 pairs from N samples)
  # No mining strategy needed - proportional distance targets enforce ordinal geometry

# Loss Weighting Configuration
loss_weights:
  lambda1: 0.7  # Weight for classification loss
  lambda2: 0.3  # Weight for ordinal triplet loss
  lambda3: 0.0  # Weight for distillation loss

# Cross Validation Configuration
cross_validation:
  use_cross_validation: true

# Logging Configuration
logging:
  run_name: 'resnet50_adam_ocl'  # Adam optimizer with OCL
  log_dir: './runs'
